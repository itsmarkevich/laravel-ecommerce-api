stages:
  - build
  - code-quality

build_image:
  stage: build
  image: docker:28.4.0
  services:
    - name: docker:28.4.0-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker info
    - docker build -t pizza-shop-ci .

cs:
  stage: code-quality
  image: php:8.2-cli
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev
    - docker-php-ext-install zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer install --no-interaction --prefer-dist
    - composer cs:check

phpstan:
  stage: code-quality
  image: php:8.2-cli
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev
    - docker-php-ext-install zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer install --no-interaction --prefer-dist
    - composer stan

rector:
  stage: code-quality
  image: php:8.2-cli
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev
    - docker-php-ext-install zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - composer install --no-interaction --prefer-dist
    - composer rector:check

test:
  stage: code-quality
  image: php:8.2-cli
  services:
    - name: postgres:18
      alias: postgres
  variables:
    APP_ENV: testing
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: test_db
    DB_USERNAME: postgres
    DB_PASSWORD: postgres
    POSTGRES_DB: test_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    PGPASSWORD: postgres
  before_script:
    - apt-get update && apt-get install -y git unzip libzip-dev libpq-dev postgresql-client
    - docker-php-ext-install zip pdo_pgsql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - until pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done
  script:
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist
    - php artisan key:generate --force
    - php artisan jwt:secret --force
    - composer test
